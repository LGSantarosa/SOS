<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SOS_Gestão de Cadastro</title>
    <link rel="stylesheet" href="../../padrao_img-css-html/style-padrao.css">
    <link rel="stylesheet" href="cadastro-admin_style.css">
</head>
<body>
    <header>

      <img id="logo" src="../../padrao_img-css-html/sos-logo.png" alt="Imagem principal">
      <h1>Sistema de Organização de Solicitações</h1>

    </header>

  <div class="container">
    
    <form id="adminForm">
      <label for="name">Nome Completo:</label>
      <input type="text" id="name" name="name" required>

      <label for="cpf">CPF:</label>
      <input type="text" id="cpf" name="cpf" required>

      <label for="birthDate">Data de Nascimento:</label>
      <input type="text" id="birthDate" name="birthDate" required>

      <label for="phone">Telefone:</label>
      <input type="text" id="phone" name="phone" required>

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required>

      <label for="confirmEmail">Confirmar e-mail:</label>
      <input type="email" id="confirmEmail" name="confirmEmail" required>

      <label for="departamento">Departamento:</label>
      <input type="text" id="departamento" name="departamento" required>

      <label for="administrador">Administrador:</label>
      <select id="administrador" name="administrador" required>
        <option value="0">---Selecione---</option>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
      </select>

      <label for="senhaPadrao">Senha Padrão:</label>
      <input type="text" id="senhaPadrao" name="senhaPadrao" required>
  
      <button type="submit">Cadastrar</button>
      
      <button id="updateBtn">Atualizar Usuário</button>
      <button id="deleteBtn">Deletar Usuário</button>
    </form>

    

    <section class="container-read">
      <label>ID do Usuário</label>
      <input type="text" id="codigoSolicitacao">

      <label>CPF do Usuário</label>
      <input type="text" id="codigoMantis">

      <button id="filterBtn">Filtrar</button>
      <button id="readBtn">Ver todos os usuários</button>

      <div class="resultado">
        <h2>Resultado da Busca</h2>
        <p id="responseMessage"></p>
      </div>
    </section>

  </div>

  <script src="cadastro-script.js"></script>
</body>
</html>
